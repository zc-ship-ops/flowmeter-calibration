<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流量计环道检定实验 — 三维工艺动画（8分镜 · 6标定点）</title>
<style>
  :root { --bg:#1a1a30; --panel:rgba(14,14,28,0.94); --text:#ccc; --accent:#4fc3f7; --green:#4caf84; --red:#e0556a; --gold:#ffb74d; --warn:#ff9100; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; overflow:hidden; height:100vh; user-select:none; }
  #canvas3d { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }

  #top-bar { position:fixed; top:0; left:0; right:0; z-index:10; background:linear-gradient(180deg, rgba(0,0,0,0.88) 0%, transparent 100%); padding:10px 20px 22px; display:flex; align-items:center; gap:18px; pointer-events:none; }
  #top-bar>* { pointer-events:auto; }
  #title { font-size:1.05rem; font-weight:700; color:#fff; letter-spacing:2px; text-shadow:0 0 18px rgba(79,195,247,0.4); }
  #scene-dots { display:flex; gap:5px; }
  .scene-dot { width:9px;height:9px;border-radius:50%;background:#3a3a4a;transition:all 0.45s; }
  .scene-dot.active { background:var(--accent); box-shadow:0 0 10px var(--accent); transform:scale(1.35); }
  .scene-dot.done { background:var(--green); }

  #bottom-bar { position:fixed; bottom:0; left:0; right:0; z-index:10; background:linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); padding:22px 20px 12px; display:flex; align-items:flex-end; justify-content:center; gap:14px; }
  #scene-label { color:#fff; font-size:0.95rem; font-weight:600; text-align:center; min-width:220px; text-shadow:0 0 8px rgba(0,0,0,0.8); }
  #scene-desc { color:#aab; font-size:0.74rem; text-align:center; max-width:460px; text-shadow:0 0 6px rgba(0,0,0,0.8); }
  .ctrl-btn { padding:7px 18px; border-radius:18px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#ccd; cursor:pointer; font-size:0.78rem; backdrop-filter:blur(6px); transition:all 0.25s; letter-spacing:1px; }
  .ctrl-btn:hover { background:rgba(255,255,255,0.14); border-color:var(--accent); color:#fff; box-shadow:0 0 14px rgba(79,195,247,0.2); }
  .ctrl-btn.active-btn { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

  #right-panel { position:fixed; right:12px; top:50%; transform:translateY(-50%); z-index:10; display:flex; flex-direction:column; gap:10px; }
  .info-card { background:var(--panel); border-radius:12px; border:1px solid rgba(255,255,255,0.08); padding:14px 16px; backdrop-filter:blur(10px); min-width:195px; }
  .info-card h3 { color:var(--accent); font-size:0.75rem; letter-spacing:1.5px; margin-bottom:10px; text-align:center; text-transform:uppercase; }
  .info-card .row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.74rem; }
  .info-card .row .lbl { color:#889; }
  .info-card .row .val { color:#fff; font-weight:600; font-family:'Cascadia Code','Consolas',monospace; }
  .info-card .row .val.warn { color:var(--gold); }
  .bar-row { margin:4px 0; }
  .bar-row .bar-hdr { font-size:0.68rem; color:#889; display:flex; justify-content:space-between; }
  .bar-row .bar-bg { height:5px; background:rgba(255,255,255,0.07); border-radius:3px; margin-top:2px; overflow:hidden; }
  .bar-row .bar-fg { height:100%; border-radius:3px; transition:width 0.5s ease-out; }
  .bar-fg.std { background:var(--accent); }
  .bar-fg.dut { background:var(--gold); }

  #cal-table { font-size:0.7rem; width:100%; border-collapse:collapse; margin-top:6px; }
  #cal-table th { color:#889; font-weight:400; text-align:left; padding:2px 4px; border-bottom:1px solid rgba(255,255,255,0.1); }
  #cal-table td { color:#ccc; padding:2px 4px; text-align:right; font-family:'Cascadia Code','Consolas',monospace; }
  #cal-table td.pt { text-align:left; color:var(--gold); }
  #cal-table td.done { color:var(--green); }
  #cal-table td.current { color:var(--accent); animation:pulse 0.8s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity:0.5; } to { opacity:1; } }

  #left-side { position:fixed; left:12px; top:50%; transform:translateY(-50%); z-index:10; display:flex; flex-direction:column; gap:8px; max-width:210px; }
  #legend { background:var(--panel); border-radius:12px; border:1px solid rgba(255,255,255,0.08); padding:10px 13px; backdrop-filter:blur(10px); font-size:0.66rem; }
  #legend .item { display:flex; align-items:center; gap:6px; margin:3px 0; color:#99a; }
  #legend .swatch { width:9px;height:9px;border-radius:2px; flex-shrink:0; }
  #legend .swatch.circle { border-radius:50%; }

  #principle-card { background:var(--panel); border-radius:12px; border:1px solid rgba(255,255,255,0.1); padding:12px 14px; backdrop-filter:blur(10px); font-size:0.7rem; max-height:380px; overflow-y:auto; }
  #principle-card h3 { color:var(--gold); font-size:0.72rem; letter-spacing:1px; margin-bottom:10px; display:flex; align-items:center; gap:5px; }
  #principle-card .principle-item { padding:6px 8px; margin:4px 0; border-left:2px solid rgba(255,255,255,0.15); border-radius:0 6px 6px 0; background:rgba(255,255,255,0.02); color:#bbc; font-size:0.68rem; line-height:1.5; transition:all 0.4s; }
  #principle-card .principle-item.highlight { border-left-color:var(--accent); background:rgba(79,195,247,0.08); color:#fff; }
  #principle-card .principle-item .p-tag { display:inline-block; font-size:0.6rem; padding:1px 6px; border-radius:8px; margin-right:4px; font-weight:600; }
  .p-tag.formula { background:rgba(79,195,247,0.2); color:var(--accent); }
  .p-tag.key { background:rgba(255,183,77,0.2); color:var(--gold); }
  .p-tag.warn { background:rgba(224,85,106,0.2); color:var(--red); }

  #status-toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:20; background:rgba(0,0,0,0.85); color:#fff; padding:10px 24px; border-radius:22px; font-size:0.85rem; font-weight:600; pointer-events:none; transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275); border:1px solid rgba(255,255,255,0.2); }
  #status-toast.show { transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div id="top-bar">
  <span id="title">🔬 流量计环道检定实验</span>
  <span id="scene-dots"></span>
</div>

<div id="left-side">
  <div id="legend">
    <div style="color:#fff;font-weight:600;margin-bottom:6px;">图例</div>
    <div class="item"><span class="swatch" style="background:#7ec8e3;"></span> DN80 管路 (Ф80)</div>
    <div class="item"><span class="swatch" style="background:#9adbc8;"></span> DN50 管路 (Ф50)</div>
    <div class="item"><span class="swatch" style="background:#b8e6c8;"></span> DN32 管路 (Ф32)</div>
    <div class="item"><span class="swatch" style="background:#ffb74d;"></span> 旁通管路</div>
    <div class="item"><span class="swatch circle" style="background:var(--green);"></span> 阀门导通</div>
    <div class="item"><span class="swatch circle" style="background:var(--red);"></span> 阀门关闭</div>
    <div class="item"><span class="swatch circle" style="background:var(--warn);"></span> 调节阀节流</div>
  </div>

  <div id="principle-card">
    <h3><span>⚙</span> 关键原理</h3>
    <div id="principle-content">
      <div class="principle-item">等待动画开始…</div>
    </div>
  </div>
</div>

<div id="right-panel">
  <div class="info-card">
    <h3>📊 实时工况</h3>
    <div class="row"><span class="lbl">压力 P</span><span class="val" id="vp">0.00 kPa</span></div>
    <div class="row"><span class="lbl">温度 T</span><span class="val" id="vt">20.0 °C</span></div>
    <div class="row"><span class="lbl">瞬时流量</span><span class="val" id="vf">0.00 m³/h</span></div>
    <div class="row"><span class="lbl">风机转速</span><span class="val" id="vr">0 rpm</span></div>
    <div class="row"><span class="lbl">旁通开度</span><span class="val" id="vb">0%</span></div>
    <div class="row"><span class="lbl">当前管径</span><span class="val" id="vd">—</span></div>
    <div class="row"><span class="lbl">目标流量点</span><span class="val warn" id="vpt">—</span></div>
  </div>

  <div class="info-card">
    <h3>📈 标准表 vs 被检表</h3>
    <div class="bar-row"><div class="bar-hdr"><span>标准表</span><span id="bstd">—</span></div><div class="bar-bg"><div class="bar-fg std" id="bstd_f" style="width:0%"></div></div></div>
    <div class="bar-row"><div class="bar-hdr"><span>被检表</span><span id="bdut">—</span></div><div class="bar-bg"><div class="bar-fg dut" id="bdut_f" style="width:0%"></div></div></div>
  </div>

  <div class="info-card">
    <h3>📋 标定点记录</h3>
    <table id="cal-table">
      <thead><tr><th>#</th><th>目标点</th><th>标准表</th><th>被检表</th><th>偏差%</th></tr></thead>
      <tbody id="cal-tbody"></tbody>
    </table>
  </div>
</div>

<div id="bottom-bar">
  <button class="ctrl-btn" id="btn-prev">◀ 上一步</button>
  <div style="text-align:center;">
    <div id="scene-label">步骤一：初始工艺流程导通</div>
    <div id="scene-desc">建立安全回路 — 阀门逐级开启</div>
  </div>
  <button class="ctrl-btn" id="btn-next">下一步 ▶</button>
  <button class="ctrl-btn active-btn" id="btn-auto">⏯ 自动演示</button>
  <button class="ctrl-btn" id="btn-speed">⏩ 1×</button>
</div>

<div id="status-toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ==================== 场景初始化 ====================
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#2a2a3c');
scene.fog = new THREE.Fog('#2a2a3c', 26, 62);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.5, 80);
camera.position.set(8, 6.5, 10);
camera.lookAt(0, 0.4, 0.3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.4, 0.3);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 24;
controls.maxPolarAngle = Math.PI * 0.55;
controls.update();

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:5;';
document.body.appendChild(labelRenderer.domElement);

// 光照
scene.add(new THREE.AmbientLight('#8899bb', 1.5));
const sun = new THREE.DirectionalLight('#fff8e7', 4.2);
sun.position.set(10, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top = 12; sun.shadow.camera.bottom = -8;
sun.shadow.bias = -0.0001;
scene.add(sun);
scene.add(new THREE.DirectionalLight('#8899cc', 0.7).position.set(-4,2,-3));

// 地面
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 20),
  new THREE.MeshStandardMaterial({ color:'#3a3a4c', roughness:0.6, metalness:0.2 })
);
gnd.rotation.x = -Math.PI/2; gnd.position.y = -2.4; gnd.receiveShadow = true;
scene.add(gnd);
const grid = new THREE.PolarGridHelper(14, 48, 24, 256, '#555568', '#444458');
grid.position.y = -2.39; scene.add(grid);

// ==================== 辅助函数 ====================
function createPipe(pathPoints, radius, color) {
  const curve = new THREE.CatmullRomCurve3(pathPoints.map(p => new THREE.Vector3(...p)));
  const geo = new THREE.TubeGeometry(curve, 80, radius, 16, false);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.35, metalness:0.55 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = mesh.receiveShadow = true;
  mesh.userData = { curve, radius };
  return mesh;
}

function createValve(pos, label, color='#e0556a') {
  const group = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.45, 12);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness:0.25, metalness:0.6, emissive:color, emissiveIntensity:0.4 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.22;
  group.add(body);
  const wheelGeo = new THREE.TorusGeometry(0.16, 0.045, 8, 10);
  const wheel = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({ color:'#ddd', roughness:0.3, metalness:0.8 }));
  wheel.position.y = 0.5;
  group.add(wheel);
  group.position.set(...pos);
  group.userData = { label, body, isOpen:false, throttled:false, throttlePct:100 };
  const div = document.createElement('div');
  div.textContent = label;
  div.style.cssText = 'color:#bbb;font-size:8.5px;font-weight:600;background:rgba(0,0,0,0.72);padding:1px 4px;border-radius:2px;white-space:nowrap;';
  const tag = new CSS2DObject(div);
  tag.position.set(0, 0.72, 0);
  group.add(tag);
  return group;
}

function setValveState(valve, state) {
  // state: 'closed'=red, 'open'=green, 'throttle'=orange
  let color, throttled=false, throttlePct=100;
  if (state === 'open') { color = '#4caf84'; }
  else if (state === 'throttle') { color = '#ff9100'; throttled=true; throttlePct=30; }
  else { color = '#e0556a'; }
  valve.userData.body.material.color.set(color);
  valve.userData.body.material.emissive.set(color);
  valve.userData.body.material.emissiveIntensity = throttled ? 0.85 : 0.4;
  valve.userData.isOpen = (state !== 'closed');
  valve.userData.throttled = throttled;
  valve.userData.throttlePct = throttlePct;
  valve.userData.body.scale.set(1, throttlePct/100, 1);
}

function createGauge(pos, label) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.55,0.4,0.07), new THREE.MeshStandardMaterial({ color:'#1a1a2e', roughness:0.2, metalness:0.5 })));
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.44,0.27), new THREE.MeshStandardMaterial({ color:'#001122', roughness:0.1, metalness:0.3, emissive:'#003366', emissiveIntensity:0.5 })).position.set(0,0,0.04));
  g.position.set(...pos);
  const d = document.createElement('div');
  d.textContent = label; d.style.cssText = 'color:#889;font-size:7.5px;background:rgba(0,0,0,0.65);padding:1px 3px;border-radius:2px;';
  const t = new CSS2DObject(d); t.position.set(0,0.32,0); g.add(t);
  return g;
}

// ==================== 管路系统 ====================
const pipeGroup = new THREE.Group(); scene.add(pipeGroup);

const supplyHdr  = createPipe([[-5.5,0,-1.2],[-5.5,0,2.2]], 0.28, '#8899aa');
const returnHdr  = createPipe([[ 5.5,0,-1.2],[ 5.5,0,2.2]], 0.28, '#8899aa');
const mainSup1   = createPipe([[-7,0,0.5],[-5.5,0,0.5]], 0.28, '#8899aa');
const mainSup2   = createPipe([[-5.5,0,1.5],[-7,0,1.5]], 0.28, '#8899aa');
const bypassPipe = createPipe([[-5.5,0,2.0],[ 5.5,0,2.0]], 0.19, '#ffb74d');
const dn80Pipe   = createPipe([[-5.5,0,1.0],[ 5.5,0,1.0]], 0.24, '#7ec8e3');
const dn50Pipe   = createPipe([[-5.5,0,0.0],[ 5.5,0,0.0]], 0.17, '#9adbc8');
const dn32Pipe   = createPipe([[-5.5,0,-1.0],[ 5.5,0,-1.0]], 0.12, '#b8e6c8');
const blowerIn   = createPipe([[-7,0,1.0],[-8.5,0,1.0]], 0.28, '#8899aa');
const blowerOut  = createPipe([[-8.5,0,0.5],[-7,0,0.5]], 0.28, '#8899aa');

[supplyHdr,returnHdr,mainSup1,mainSup2,bypassPipe,dn80Pipe,dn50Pipe,dn32Pipe,blowerIn,blowerOut]
  .forEach(p => pipeGroup.add(p));

// ==================== 阀门系统 ====================
const valves = {};
const valveGroup = new THREE.Group(); scene.add(valveGroup);

// 旁通安全回路
valves['FV134'] = createValve([-4.0,0.05,2.0], 'FV134');
valves['HV144'] = createValve([ 4.0,0.05,2.0], 'HV144');

// DN80 标准表管路
valves['HV125'] = createValve([-3.5,0.05,1.0], 'HV125');
valves['HV115'] = createValve([-1.0,0.05,1.0], 'HV115');
valves['HV172'] = createValve([ 0.0,0.05,1.0], 'HV172');

// DN80 被检表管路
valves['HV171'] = createValve([ 1.0,0.05,1.0], 'HV171');
valves['HV111'] = createValve([ 3.5,0.05,1.0], 'HV111'); // 出口
valves['HV121'] = createValve([-2.0,0.05,1.0], 'HV121'); // 进口

// DN50 隔离阀
valves['HV113'] = createValve([-3.5,0.05,0.0], 'HV113');
valves['HV123'] = createValve([ 3.5,0.05,0.0], 'HV123');

// DN32 隔离阀
valves['HV112'] = createValve([-3.5,0.05,-1.0], 'HV112');
valves['HV122'] = createValve([ 3.5,0.05,-1.0], 'HV122');

// 流量调节阀
valves['FV131'] = createValve([-1.5,0.05,1.3], 'FV131');
valves['HV141'] = createValve([ 0.5,0.05,1.25], 'HV141');
valves['FV132'] = createValve([-1.5,0.05,0.35], 'FV132');
valves['HV142'] = createValve([ 0.5,0.05,0.3], 'HV142');
valves['FV133'] = createValve([-1.5,0.05,-0.6], 'FV133');
valves['HV143'] = createValve([ 0.5,0.05,-0.65], 'HV143');

// 站场旁通阀 (PPT Slide 21: 流量调节回路包含)
valves['HV173'] = createValve([-2.5,0.05,0.7], 'HV173');
valves['HV175'] = createValve([ 2.5,0.05,0.7], 'HV175');
valves['HV176'] = createValve([ 2.5,0.05,-0.3], 'HV176');

// 风机循环阀
valves['HV163'] = createValve([-7.0,0.05,1.0], 'HV163');
valves['HV162'] = createValve([-7.0,0.05,0.5], 'HV162');
valves['HV314'] = createValve([-8.0,0.05,0.75], 'HV314');

Object.values(valves).forEach(v => valveGroup.add(v));

// ==================== 风机 C301 ====================
const blowerGroup = new THREE.Group();
blowerGroup.position.set(-8.5, 0.3, 0.75);
scene.add(blowerGroup);

const blowerBody = new THREE.Mesh(
  new THREE.CylinderGeometry(0.5, 0.6, 1.2, 24),
  new THREE.MeshStandardMaterial({ color:'#667788', roughness:0.3, metalness:0.7 })
);
blowerBody.castShadow = true;
blowerGroup.add(blowerBody);

const impellerGroup = new THREE.Group();
impellerGroup.position.y = 0.15;
blowerGroup.add(impellerGroup);
for (let i = 0; i < 8; i++) {
  const blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.35, 0.4),
    new THREE.MeshStandardMaterial({ color:'#99aabb', roughness:0.2, metalness:0.8 })
  );
  blade.position.x = Math.cos(i*Math.PI/4)*0.28;
  blade.position.z = Math.sin(i*Math.PI/4)*0.28;
  blade.rotation.y = i*Math.PI/4;
  impellerGroup.add(blade);
}

const blowerDiv = document.createElement('div');
blowerDiv.textContent = 'C301 漩涡风机';
blowerDiv.style.cssText = 'color:#ffb74d;font-size:9.5px;font-weight:700;background:rgba(0,0,0,0.75);padding:2px 7px;border-radius:3px;';
const blowerTag = new CSS2DObject(blowerDiv);
blowerTag.position.set(0, 1.05, 0);
blowerGroup.add(blowerTag);

const vortexMat = new THREE.MeshStandardMaterial({ color:'#88ccff', roughness:0.3, metalness:0.1, transparent:true, opacity:0.25 });
const vRing = new THREE.Mesh(new THREE.TorusGeometry(0.45,0.06,16,32), vortexMat);
vRing.rotation.x = Math.PI/2; vRing.position.y = 0.15; blowerGroup.add(vRing);
const vRing2 = new THREE.Mesh(new THREE.TorusGeometry(0.35,0.05,16,32), vortexMat.clone());
vRing2.rotation.x = Math.PI/2; vRing2.position.y = -0.15; blowerGroup.add(vRing2);

// ==================== 仪表 ====================
const gaugeGroup = new THREE.Group();
['P/T ①','P/T ②','P/T ③','P/T ④'].forEach((l,i) => {

const MAX_P = 200;
const particleSystems = {};
Object.entries(pipePaths).forEach(([key, { curve, r, color }]) => {
  const geo = new THREE.SphereGeometry(r*0.5, 6, 6);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.2, metalness:0.1, emissive:color, emissiveIntensity:0.75 });
  const im = new THREE.InstancedMesh(geo, mat, MAX_P);
  im.castShadow = true; im.count = 0; im.visible = false;
  const dummy = new THREE.Object3D();
  const particles = Array.from({length:MAX_P}, () => ({ t:Math.random(), speed:0, active:false }));
  for (let i=0;i<MAX_P;i++) { dummy.position.set(0,-999,0); dummy.scale.set(1,1,1); dummy.updateMatrix(); im.setMatrixAt(i, dummy.matrix); }
  im.userData = { particles, curve, dummy, key };
  particleSystems[key] = im;
  particlesGroup.add(im);
});

function initCalTable() {

  tbody.innerHTML = CAL_POINT_NAMES.map((n,i) =>
    `<tr><td>${i+1}</td><td class="pt">${n}</td><td id="cs${i}">—</td><td id="cd${i}">—</td><td id="ce${i}">—</td></tr>`
  ).join('');
}

function recordCalPoint(idx, stdFlowRate) {
  const dutFlowRate = stdFlowRate * (0.985 + Math.random()*0.03); // 被检表略低
  const dev = ((dutFlowRate - stdFlowRate) / stdFlowRate * 100).toFixed(2);
  calPoints[idx] = { pt: CAL_POINT_NAMES[idx], stdFlow: stdFlowRate, dutFlow: dutFlowRate, deviation: parseFloat(dev) };
  document.getElementById(`cs${idx}`).textContent = `${(stdFlowRate*120).toFixed(2)}`;
  document.getElementById(`cd${idx}`).textContent = `${(dutFlowRate*120).toFixed(2)}`;
  document.getElementById(`ce${idx}`).textContent = `${dev}%`;
  document.getElementById(`ce${idx}`).style.color = Math.abs(dev) < 0.5 ? '#4caf84' : '#ff9100';
  [ `cs${idx}`,`cd${idx}`,`ce${idx}` ].forEach(id => {
    document.getElementById(id).classList.add('done');
    document.getElementById(id).classList.remove('current');
  });
}

function highlightCalPoint(idx) {
  [ `cs${idx}`,`cd${idx}`,`ce${idx}` ].forEach(id => {
    document.getElementById(id).classList.add('current');
    document.getElementById(id).classList.remove('done');
  });
}

function clearCalHighlight() {
  CAL_POINT_NAMES.forEach((_,i) => {
    [ `cs${i}`,`cd${i}`,`ce${i}` ].forEach(id => document.getElementById(id).classList.remove('current'));
  });
}

// ==================== 动作执行 ====================
let toastTimer = 0;
function showToast(msg) {
  const el = document.getElementById('status-toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = 1.8;
  setTimeout(() => { if (toastTimer <= 0) el.classList.remove('show'); }, 1800);
}

function executeAction(action, params, desc) {
  if (desc) {
    document.getElementById('scene-desc').textContent = desc;
  }
  switch(action) {
    case 'flash': {
      params.valves.forEach(name => {
        if (!valves[name]) return;
        const origEmissive = valves[name].userData.body.material.emissive.getHex();
        valves[name].userData.body.material.emissive.set('#ffff88');
        valves[name].userData.body.material.emissiveIntensity = 1.8;
        setTimeout(() => {
          if (valves[name]) {
            const c = valves[name].userData.isOpen ? '#4caf84' : (valves[name].userData.throttled ? '#ff9100' : '#e0556a');
            valves[name].userData.body.material.emissive.set(c);
            valves[name].userData.body.material.emissiveIntensity = valves[name].userData.throttled ? 0.85 : 0.4;
          }
        }, 700);
      });
      break;
    }
    case 'setV': {
      params.valves.forEach(name => {
        if (valves[name]) setValveState(valves[name], params.state);
      });
      break;
    }
    case 'blower':
      blowerRunning.tgt = params.on ? 1 : 0;
      if (params.on) showToast('🔧 风机 C301 启动');
      else showToast('⏹ 风机 C301 停机');
      break;
    case 'flowAll':
      Object.keys(flow).forEach(k => { flow[k] = params.rate; });
      Object.keys(particleSystems).forEach(k => {
        if (!['sL','sR'].includes(k)) particleSystems[k].visible = params.rate > 0.005;
      });
      break;
    case 'bypass':
      bypassPct.tgt = params.pct / 100;
      break;
    case 'setFlow': {
      const dn = params.dn;
      if (dn === 'dn80') { flow.dn80 = params.rate; particleSystems['dn80'].visible = params.rate > 0.005; }
      if (dn === 'dn50') { flow.dn50 = params.rate; particleSystems['dn50'].visible = params.rate > 0.005; }
      if (dn === 'dn32') { flow.dn32 = params.rate; particleSystems['dn32'].visible = params.rate > 0.005; }
      break;
    }
    case 'flowShare': {
      if (params.dn80 !== undefined) { flow.dn80 = params.dn80; particleSystems['dn80'].visible = params.dn80 > 0.005; }
      if (params.dn50 !== undefined) { flow.dn50 = params.dn50; particleSystems['dn50'].visible = params.dn50 > 0.005; }
      if (params.dn32 !== undefined) { flow.dn32 = params.dn32; particleSystems['dn32'].visible = params.dn32 > 0.005; }
      break;
    }
    case 'throttle': {
      if (params.restore) {
        ['FV131','FV132','FV133'].forEach(name => {
          if (valves[name]) setValveState(valves[name], 'open');
        });
      } else {
        ['FV131','FV132','FV133'].forEach(name => {
          if (valves[name]) setValveState(valves[name], 'throttle');
        });
      }
      break;
    }
    case 'calPt': {
      const ptName = params.target;
      document.getElementById('vpt').textContent = ptName;
      clearCalHighlight();
      highlightCalPoint(params.idx);
      showToast(`🎯 目标: ${ptName}`);
      break;
    }
    case 'record': {
      recordCalPoint(params.idx, params.rate);
      showToast(`📝 采集 ${CAL_POINT_NAMES[params.idx]} 数据 ✓`);
      break;
    }
    case 'switchDN': {
      currentDN = params;
      document.getElementById('vd').textContent = params;
      showToast(`🔄 切换至 ${params} 管道`);
      break;
    }
    case 'status': {
      showToast(params || desc || '');
      break;
    }
    case 'resetAll': {
      Object.values(valves).forEach(v => setValveState(v, 'closed'));
      break;
    }
  }
}

// ==================== 场景点指示器 ====================
function buildSceneDots() {
  const container = document.getElementById('scene-dots');
  container.innerHTML = scenes.map((_,i) =>
    `<span class="scene-dot${i===0?' active':''}" data-idx="${i}" title="步骤${i+1}"></span>`
  ).join('');
  // 点击跳转
  container.querySelectorAll('.scene-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.idx);
      jumpToScene(idx);
    });
  });
}

function updateSceneDots() {
  document.querySelectorAll('.scene-dot').forEach((dot,i) => {
    dot.classList.remove('active','done');
    if (i < currentSceneIdx) dot.classList.add('done');
    if (i === currentSceneIdx) dot.classList.add('active');
  });
}

function jumpToScene(idx) {
  currentSceneIdx = Math.max(0, Math.min(scenes.length-1, idx));
  phaseIdx = 0;
  phaseTimer = 0;
  sceneComplete = false;
  initCalTable();
  // 重置到该场景初始状态
  resetStateForScene(currentSceneIdx);
  updateSceneUI();
  updateSceneDots();
}

function resetStateForScene(idx) {
  // 关闭所有阀门
  Object.values(valves).forEach(v => setValveState(v, 'closed'));
  Object.keys(flow).forEach(k => { flow[k] = 0; });
  bypassPct.tgt = 0; bypassPct.cur = 0;
  blowerRunning.tgt = 0; blowerRunning.cur = 0;
  Object.values(particleSystems).forEach(ps => { ps.visible = false; ps.count = 0; });
  document.getElementById('vpt').textContent = '—';
  document.getElementById('vd').textContent = '—';
  clearCalHighlight();

  // 根据目标场景恢复前置状态
  if (idx >= 1) { // 场景1的阀门状态
    ['FV134','HV144','HV125','HV115','HV172','HV171','HV111','HV121',
     'FV131','HV141','FV132','HV142','FV133','HV143','HV173','HV175','HV176'].forEach(n => {
      if (valves[n]) setValveState(valves[n], 'open');
    });
    if (idx >= 2) { // 风机循环阀 + 风机启动
      ['HV163','HV162','HV314'].forEach(n => { if(valves[n]) setValveState(valves[n], 'open'); });
      blowerRunning.tgt = 1; blowerRunning.cur = 1;
      Object.keys(flow).forEach(k => { flow[k] = 0.12; });
      Object.keys(particleSystems).forEach(k => {
        if (!['sL','sR'].includes(k)) particleSystems[k].visible = true;
      });
      bypassPct.tgt = 1.0; bypassPct.cur = 1.0;
      currentDN = 'DN80'; document.getElementById('vd').textContent = 'DN80';
    }
  }
}

// ==================== UI 更新 ====================
function updatePrinciples(idx) {
  const sc = scenes[idx];
  const container = document.getElementById('principle-content');
  if (!sc.principles || sc.principles.length === 0) {
    container.innerHTML = '<div class="principle-item">暂无原理标注</div>';
    return;
  }
  container.innerHTML = sc.principles.map((p, i) => {
    const tagClass = p.tag || 'key';
    const tagLabel = { formula: '公式', key: '原理', warn: '注意' }[tagClass] || '原理';
    return `<div class="principle-item" style="animation-delay:${i*0.12}s">
      <span class="p-tag ${tagClass}">${tagLabel}</span> ${p.text}
    </div>`;
  }).join('');
}

function updateSceneUI() {
  const sc = scenes[currentSceneIdx];
  document.getElementById('scene-label').textContent = sc.name;
  updatePrinciples(currentSceneIdx);
}

function updateDataPanel() {
  const press = blowerRunning.cur > 0.01 ? (15 + Math.sin(Date.now()*0.003)*3 + (flow.dn80*45+flow.dn50*28+flow.dn32*18)).toFixed(2) : '0.00';
  const temp = (20 + (blowerRunning.cur > 0.01 ? (flow.dn80*8+flow.dn50*5+flow.dn32*3) : 0)).toFixed(1);
  const totalFlow = (flow.dn80*120 + flow.dn50*55 + flow.dn32*28 + flow.bypass*60);
  const rpm = blowerRunning.cur > 0.01 ? (1450 + Math.sin(Date.now()*0.002)*50).toFixed(0) : '0';
  const bp = (bypassPct.cur*100).toFixed(0);

  document.getElementById('vp').textContent = `${press} kPa`;
  document.getElementById('vt').textContent = `${temp} °C`;
  document.getElementById('vf').textContent = `${totalFlow.toFixed(2)} m³/h`;
  document.getElementById('vr').textContent = `${rpm} rpm`;
  document.getElementById('vb').textContent = `${bp}%`;

  const activeFlow = flow.dn32>0.01 ? flow.dn32 : flow.dn50>0.01 ? flow.dn50 : flow.dn80>0.01 ? flow.dn80 : 0;
  const stdPct = Math.min(100, activeFlow*100);
  document.getElementById('bstd_f').style.width = `${stdPct}%`;
  document.getElementById('bstd').textContent = `${(activeFlow*120).toFixed(1)} m³/h`;
  document.getElementById('bdut_f').style.width = `${stdPct*0.97}%`;
  document.getElementById('bdut').textContent = `${(activeFlow*116.4).toFixed(1)} m³/h`;
}

// ==================== 主循环 ====================
const clock = new THREE.Clock();
let totalElapsed = 0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  totalElapsed += dt;

  controls.update();

  // Toast 计时
  if (toastTimer > 0) {
    toastTimer -= dt;
    if (toastTimer <= 0) document.getElementById('status-toast').classList.remove('show');
  }

  // 自动演示逻辑
  if (autoPlay && !sceneComplete) {
    const sc = scenes[currentSceneIdx];
    if (sc && phaseIdx < sc.phases.length) {
      const phase = sc.phases[phaseIdx];
      if (phaseTimer >= phase.time) {
        executeAction(phase.action, phase.params, phase.desc);
        phaseIdx++;
        phaseTimer = 0;
      }
    } else if (sc && phaseIdx >= sc.phases.length) {
      sceneComplete = true;
      if (currentSceneIdx < scenes.length - 1) {
        // 等待后自动进入下一场景
        if (phaseTimer > 3.5) {
          currentSceneIdx++;
          phaseIdx = 0;
          phaseTimer = 0;
          sceneComplete = false;
          initCalTable();
          updateSceneUI();
          updateSceneDots();
        }
      } else {
        // 全部完成
        autoPlay = false;
        document.getElementById('btn-auto').classList.remove('active-btn');
        document.getElementById('btn-auto').textContent = '▶ 重新播放';
        document.getElementById('scene-desc').textContent = '🎉 全部 8 个步骤完成 — 3 个口径 × 6 点 = 18 个标定点';
      }
    }
  }

  phaseTimer += dt * playSpeed;

  // 平滑过渡
  blowerRunning.cur += (blowerRunning.tgt - blowerRunning.cur) * dt * 2.0;
  bypassPct.cur += (bypassPct.tgt - bypassPct.cur) * dt * 1.8;

  // 风机旋转 & 气旋
  if (blowerRunning.cur > 0.01) {
    impellerGroup.rotation.y += dt * 18 * blowerRunning.cur;
    const vscale = 0.7 + 0.3*blowerRunning.cur + Math.sin(totalElapsed*8)*0.15;
    vRing.scale.setScalar(vscale);
    vRing2.scale.setScalar(vscale*0.85);
    vRing.material.opacity = 0.12 + blowerRunning.cur*0.35;
    vRing2.material.opacity = 0.08 + blowerRunning.cur*0.3;
    vRing.rotation.z += dt*3;
    vRing2.rotation.z -= dt*2.5;
  } else {
    vRing.material.opacity = 0.03;
    vRing2.material.opacity = 0.03;
  }

  // 更新粒子
  Object.entries(particleSystems).forEach(([key, mesh]) => {
    const { particles, curve, dummy } = mesh.userData;
    if (!mesh.visible) { mesh.count = 0; mesh.instanceMatrix.needsUpdate = true; return; }
    const rate = key==='dn80' ? flow.dn80 : key==='dn50' ? flow.dn50 :
                 key==='dn32' ? flow.dn32 : key==='bypass' ? flow.bypass :
                 Math.max(flow.dn80,flow.dn50,flow.dn32,flow.bypass)*0.6;
    const activeCount = Math.floor(rate * 45);
    mesh.count = activeCount;
    for (let i=0;i<MAX_P;i++) {
      const p = particles[i];
      if (i < activeCount) {
        if (!p.active) { p.t = Math.random(); p.active = true; }
        p.speed = 0.02 + rate*0.28;
        p.t += p.speed*dt;
        if (p.t > 1.0) p.t -= 1.0;
        const pt = curve.getPointAt(Math.max(0,Math.min(1,p.t)));
        dummy.position.set(pt.x+(Math.random()-0.5)*0.07, pt.y+(Math.random()-0.5)*0.05, pt.z+(Math.random()-0.5)*0.07);
        dummy.scale.setScalar(0.6+rate*2.0);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      } else {
        p.active = false;
        dummy.position.set(0,-999,0); dummy.scale.set(0,0,0);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      }
    }
    mesh.instanceMatrix.needsUpdate = true;
  });

  updateDataPanel();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ==================== 按钮事件 ====================
document.getElementById('btn-prev').addEventListener('click', () => jumpToScene(currentSceneIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentSceneIdx < scenes.length - 1) {
    jumpToScene(currentSceneIdx + 1);
  } else if (sceneComplete) {
    // 全部播完，重新开始
    jumpToScene(0);
    autoPlay = true;
    document.getElementById('btn-auto').classList.add('active-btn');
    document.getElementById('btn-auto').textContent = '⏯ 自动演示';
  }
});

document.getElementById('btn-auto').addEventListener('click', function() {
  if (currentSceneIdx === scenes.length - 1 && sceneComplete) {
    // 重新播放
    jumpToScene(0);
  }
  autoPlay = !autoPlay;
  sceneComplete = false;
  this.classList.toggle('active-btn', autoPlay);
  this.textContent = autoPlay ? '⏯ 自动演示' : '▶ 手动播放';
});

document.getElementById('btn-speed').addEventListener('click', function() {
  const speeds = [0.5, 1.0, 2.0, 3.0];
  const labels = ['⏩ 0.5×', '⏩ 1×', '⏩ 2×', '⏩ 3×'];
  const idx = speeds.indexOf(playSpeed);
  const next = (idx + 1) % speeds.length;
  playSpeed = speeds[next];
  this.textContent = labels[next];
});

// 键盘
window.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowLeft': document.getElementById('btn-prev').click(); break;
    case 'ArrowRight': document.getElementById('btn-next').click(); break;
    case ' ': e.preventDefault(); document.getElementById('btn-auto').click(); break;
    case 'r': camera.position.set(8,6.5,10); controls.target.set(0,0.4,0.3); controls.update(); break;
    case 't': camera.position.set(0,10,0.5); controls.target.set(0,0.4,0.3); controls.update(); break;
    case 'f': camera.position.set(10,1.5,0); controls.target.set(0,0.4,0.3); controls.update(); break;
    case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8':
      jumpToScene(parseInt(e.key)-1); break;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== 启动 ====================
buildSceneDots();
updateSceneUI();
updateDataPanel();
document.getElementById('scene-desc').textContent = '🎬 自动演示中 — 空格暂停 ｜← → 切换步骤｜数字键 1-8 跳转｜R/T/F 视角';
requestAnimationFrame(animate);

console.log('  ⌨ 1-8: 跳转步骤 | ←→: 上/下一步 | 空格: 暂停 | R/T/F: 视角');
